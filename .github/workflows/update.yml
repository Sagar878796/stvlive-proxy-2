const express = require("express");
const axios = require("axios");
const app = express();

app.get("/play", async (req, res) => {
    let url = req.query.url;

    if (!url) return res.send("No URL");

    try {
        const response = await axios({
            method: "GET",
            url: url,
            responseType: "stream",
            headers: {
                "User-Agent": "Mozilla/5.0",
                "Referer": url,
                "Origin": url
            }
        });

        // Important headers pass karo
        res.setHeader("Content-Type", response.headers["content-type"]);
        res.setHeader("Access-Control-Allow-Origin", "*");

        response.data.pipe(res);

    } catch (err) {
        console.log(err.message);
        res.status(500).send("Stream Error");
    }
});


// 🔥 M3U8 Playlist Rewrite (VERY IMPORTANT)
app.get("/m3u8", async (req, res) => {
    let url = req.query.url;

    if (!url) return res.send("No URL");

    try {
        const response = await axios.get(url, {
            headers: {
                "User-Agent": "Mozilla/5.0"
            }
        });

        let data = response.data;

        // Segment URLs ko proxy se pass karo
        data = data.replace(/(https?:\/\/[^\s]+)/g, (match) => {
            return `/play?url=${encodeURIComponent(match)}`;
        });

        res.setHeader("Content-Type", "application/vnd.apple.mpegurl");
        res.send(data);

    } catch (err) {
        res.status(500).send("M3U8 Error");
    }
});

app.get("/", (req, res) => {
    res.send("IPTV Proxy Running 🚀");
});

app.listen(3000, () => console.log("Server started"));
